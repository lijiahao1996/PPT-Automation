version: '3.8'

services:
  ppt-report:
    build: .
    container_name: ppt-report-generator
    ports:
      - "8501:8501"
    volumes:
      # 挂载配置文件
      - ./config.ini:/app/config.ini
      # 挂载输出目录（持久化）
      - ./output:/app/output
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      # 挂载模板目录
      - ./templates:/app/templates
      # 挂载资源文件
      - ./resources:/app/resources
    environment:
      # Qwen API Key（推荐通过环境变量配置）
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
